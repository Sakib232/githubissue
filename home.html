<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GitHub Issues Tracker</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#f5f5f7] text-slate-800">

  <nav class="bg-white border-b border-gray-100">
    <div class="max-w-7xl mx-auto px-4 py-3 flex flex-col md:flex-row md:items-center md:justify-between gap-4">
      <div class="flex items-center gap-3">
        
        <h1 class="text-[32px] font-bold leading-none">GitHub Issues Tracker</h1>
      </div>

      <div class="flex items-center gap-2 w-full md:w-auto">
        <input
          id="searchInput"
          type="text"
          placeholder="Search issues..."
          class="w-full md:w-[280px] h-[44px] px-4 rounded-lg border border-gray-200 outline-none focus:ring-2 focus:ring-violet-200 focus:border-violet-400 text-sm"
        />
        <button
          id="searchBtn"
          class="h-[44px] px-5 rounded-lg bg-violet-600 text-white font-medium hover:bg-violet-700 transition"
        >
          Search
        </button>
      </div>
    </div>
  </nav>

  <main class="max-w-7xl mx-auto px-4 py-8">
    <section class="bg-white rounded-2xl border border-gray-100 shadow-sm p-5 md:p-6">

      <div class="flex gap-3 mb-8">
        <button class="tab-btn bg-violet-600 text-white px-5 py-2 rounded-lg text-sm font-medium" data-status="all">
          All
        </button>
        <button class="tab-btn bg-gray-100 text-gray-600 px-5 py-2 rounded-lg text-sm font-medium" data-status="open">
          Open
        </button>
        <button class="tab-btn bg-gray-100 text-gray-600 px-5 py-2 rounded-lg text-sm font-medium" data-status="closed">
          Closed
        </button>
      </div>

      <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4 mb-8">
        <div class="flex items-center gap-3">
          <div class="w-10 h-10 rounded-full bg-violet-50 border border-violet-100 flex items-center justify-center text-violet-500 text-lg">
            ✳
          </div>

          <div>
            <h2 class="text-lg font-bold leading-none mb-1">
              <span id="issueCount">0</span> Issues
            </h2>
            <p class="text-sm text-gray-400">Track and manage your project issues</p>
          </div>
        </div>

        <div class="flex items-center gap-5 text-sm text-gray-500">
          <div class="flex items-center gap-2">
            <span class="w-2.5 h-2.5 rounded-full bg-green-500"></span>
            <span>Open</span>
          </div>
          <div class="flex items-center gap-2">
            <span class="w-2.5 h-2.5 rounded-full bg-violet-500"></span>
            <span>Closed</span>
          </div>
        </div>
      </div>

      <div id="loader" class="hidden py-12 text-center">
        <div class="w-10 h-10 mx-auto border-4 border-violet-500 border-t-transparent rounded-full animate-spin"></div>
        <p class="mt-3 text-sm text-gray-400">Loading issues...</p>
      </div>

      <div
        id="issuesContainer"
  class="grid grid-cols-2 md:grid-cols-3 xl:grid-cols-4 gap-3"
      ></div>
    </section>
  </main>

  <div id="modalOverlay" class="hidden fixed inset-0 bg-black/40 z-50 items-center justify-center px-4">
    <div class="bg-white w-full max-w-2xl rounded-2xl shadow-2xl p-6 relative">
      <button
        id="closeModal"
        class="absolute top-4 right-4 w-9 h-9 rounded-full bg-gray-100 hover:bg-gray-200 text-gray-500"
      >
        ✕
      </button>

      <div id="modalContent"></div>
    </div>
  </div>

  <script src="./app.js"></script>
</body>
</html>
