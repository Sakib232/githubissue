<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | GitHub Issues Tracker</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#f5f5f7] min-h-screen">

  <div class="max-w-md mx-auto pt-24 px-4">
    <div class="bg-white rounded-xl shadow-md p-8">
      <div class="flex flex-col items-center">
        <div class="w-20 h-20 rounded-full flex items-center justify-center text-white text-4xl mb-4">
          <span><img src="./assets/github-logo.png" alt="GitHub Logo"></span>
        </div>

        <h1 class="text-3xl font-bold text-slate-800">GitHub Issues Tracker</h1>
        <p class="text-gray-500 mt-2">Sign in to manage your issues</p>
      </div>

      <form id="loginForm" class="mt-8 space-y-5">
        <div>
          <label class="block text-sm font-medium mb-2">Username</label>
          <input
            id="username"
            type="text"
            placeholder="Enter Username"
            class="w-full border rounded-lg px-4 py-3 outline-none focus:ring-2 focus:ring-violet-500"
          />
          <p class="text-sm text-violet-600 mt-2">Default: admin</p>
        </div>

        <div>
          <label class="block text-sm font-medium mb-2">Password</label>
          <input
            id="password"
            type="password"
            placeholder="Enter Password"
            class="w-full border rounded-lg px-4 py-3 outline-none focus:ring-2 focus:ring-violet-500"
          />
          <p class="text-sm text-violet-600 mt-2">Default: admin123</p>
        </div>

        <button
          type="submit"
          class="w-full bg-violet-600 hover:bg-violet-700 text-white py-3 rounded-lg font-semibold transition"
        >
          Sign In
        </button>
      </form>

      <div class="my-6 flex items-center gap-3">
        <div class="flex-1 h-px bg-gray-200"></div>
        <span class="text-gray-400 text-sm">OR</span>
        <div class="flex-1 h-px bg-gray-200"></div>
      </div>

      <div class="bg-gray-50 rounded-lg p-4 text-center text-sm">
        <p class="text-gray-500 mb-2">Demo Credentials:</p>
        <p><span class="font-semibold">Username:</span> admin</p>
        <p><span class="font-semibold">Password:</span> admin123</p>
      </div>

      <p id="loginError" class="text-red-500 text-sm mt-4 text-center"></p>
    </div>
  </div>

  <script src="./login.js"></script>
</body>
</html>
